<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Axis - Tienda</title>
  </head>

  <body>

    <header class="header">
      <div class="header-logo">
        <img src="" alt="Logo Axis" />
        <h1>AXIS</h1>
      </div>
      <nav class="header-nav">
        <a href="#">Tienda</a>
        <a href="#">Biblioteca</a>
        <a href="#">Perfil</a>
      </nav>
      <div class="header-search">
        <img src="" alt="Buscar" />
      </div>
    </header>

    <main class="layout-main">

      <!-- Sidebar: nombre, billetera, carrito -->
      <aside class="sidebar">
        <p class="sidebar-title">Lorem</p>

        <div class="sidebar-section">
          <h3>
            <img src="" alt="Billetera icono" />
            BILLETERA
          </h3>
          <div class="sidebar-item">
            <img src="" alt="Método de pago" />
          </div>
          <div class="sidebar-item">
            <img src="" alt="Método de pago" />
          </div>
          <div class="sidebar-item">
            <img src="" alt="Método de pago" />
          </div>
        </div>

        <div class="sidebar-section">
          <h3>
            <img src="" alt="Carrito icono" />
            CARRITO
          </h3>
          <div class="sidebar-item">
            <img src="" alt="Juego en carrito" />
            <div class="sidebar-item-bar"></div>
          </div>
          <div class="sidebar-item">
            <img src="" alt="Juego en carrito" />
            <div class="sidebar-item-bar"></div>
          </div>
          <div class="sidebar-item">
            <img src="" alt="Juego en carrito" />
            <div class="sidebar-item-bar"></div>
          </div>
        </div>
      </aside>

      <!-- Contenido principal: tendencias y ofertas -->
      <div class="content">

        <div class="tienda-section-header">
          <div class="section-title">
            <img src="" alt="Tendencias icono" />
            <span>TENDENCIAS</span>
          </div>
          <div class="tienda-section-right">
            <img src="" alt="Ofertas icono" />
            <span>OFERTAS</span>
          </div>
        </div>

        <div class="tienda-grid">
          <div class="game-card"><img src="" alt="Juego 1" /></div>
          <div class="game-card"><img src="" alt="Juego 2" /></div>
          <div class="game-card"><img src="" alt="Juego 3" /></div>
          <div class="game-card"><img src="" alt="Juego 4" /></div>
          <div class="game-card"><img src="" alt="Juego 5" /></div>
          <div class="game-card"><img src="" alt="Juego 6" /></div>
          <div class="game-card"><img src="" alt="Juego 7" /></div>
          <div class="game-card"><img src="" alt="Juego 8" /></div>
        </div>

      </div>
    </main>

    <div class="help-btn">?</div>

  </body>
</html>
