<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Axis - Tienda</title>
  </head>

  <body>

    <header class="header">
      <div class="header-logo">
        <img src="" alt="Logo Axis" />
        <h1>AXIS</h1>
      </div>
      <nav class="header-nav">
        <a href="#">Tienda</a>
        <a href="#">Biblioteca</a>
        <a href="#">Perfil</a>
      </nav>
      <div class="header-search">
        <img src="" alt="Buscar" />
      </div>
    </header>

    <main class="layout-main">

<main class="layout-main tienda-layout">

      <aside class="sidebar">
        <p class="sidebar-title">Usuario</p>
        <div class="sidebar-section">
          <h3>
            <img src="img\attach_money_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Billetera icono" />
            BILLETERA
          </h3>
          <div class="sidebar-item"><img src="" alt="Método de pago" /></div>
        </div>
        <div class="sidebar-section">
          <h3>CARRITO</h3>
          <div class="sidebar-item"><img src="img\shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Juego en carrito" /></div>
          <div class="sidebar-item"><img src="img\shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Juego en carrito" /></div>
          <div class="sidebar-item"><img src="img\shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Juego en carrito" /></div>
          <div class="sidebar-item"><img src="img\shopping_cart_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Juego en carrito" /></div>
        </div>
      </aside>

      <section class="tienda-central">
        <div class="section-title-box">
          <img src="img\trending_up_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Tendencias icono" />
          <span>TENDENCIAS</span>
        </div>
        
        <div class="tienda-grid">
          <div class="game-card"><img src="img/game-1.jpg" alt="Juego 1" /></div>
          <div class="game-card"><img src="img/game-2.webp" alt="Juego 2" /></div>
          <div class="game-card"><img src="img/game-3.jpg" alt="Juego 3" /></div>
          <div class="game-card"><img src="img/game-4.jpg" alt="Juego 4" /></div>
          <div class="game-card"><img src="img/game-6.png" alt="Juego 5" /></div>
          <div class="game-card"><img src="img/game-7.webp" alt="Juego 6" /></div>
        </div>
      </section>

      <aside class="tienda-ofertas-sidebar">
        <div class="section-title-box">
          <img src="img\percent_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="Ofertas icono" />
          <span>OFERTAS</span>
        </div>

        <div class="ofertas-lista">
          <div class="game-card-oferta"><img src="img/game-8.jpg" alt="Oferta 1" /></div>
          <div class="game-card-oferta"><img src="img/game-9.webp" alt="Oferta 2" /></div>
          <div class="game-card-oferta"><img src="img/game-3.jpg" alt="Oferta 3" /></div>
        </div>
      </aside>

    </main>

    <div class="help-btn">?</div>
