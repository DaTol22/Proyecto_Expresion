<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Axis - Inicio</title>
  </head>

  <body>

    <header class="header">
      <div class="header-logo">
        <img src="" alt="Logo Axis" />
        <h1>AXIS</h1>
      </div>
      <nav class="header-nav">
        <a href="#">Tienda</a>
        <a href="#">Biblioteca</a>
        <a href="#">Perfil</a>
      </nav>
      <div class="header-search">
        <img src="" alt="Buscar" />
      </div>
    </header>

    <main>
      <div class="content">

        <!-- Sección: Banner principal + info lateral -->
        <div class="home-banner">
          <div class="home-banner-featured">
            <img src="" alt="Juego destacado" />
          </div>
          <div class="home-banner-info">
            <div class="home-banner-info-box"></div>
            <div class="home-banner-info-box"></div>
            <div class="home-banner-info-box"></div>
          </div>
        </div>

        <!-- Sección: Fila de juegos recientes -->
        <div class="home-games-row">
          <div class="game-card">
            <img src="" alt="Juego 1" />
          </div>
          <div class="game-card">
            <img src="" alt="Juego 2" />
          </div>
          <div class="game-card">
            <img src="" alt="Juego 3" />
          </div>
          <div class="game-card">
            <img src="" alt="Juego 4" />
          </div>
        </div>

      </div>
    </main>

    <div class="help-btn">?</div>
