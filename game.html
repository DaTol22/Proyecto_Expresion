<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Axis - Detalle de juego</title>
  </head>

  <body>

    <header class="header">
      <div class="header-logo">
        <img src="" alt="Logo Axis" />
        <h1>AXIS</h1>
      </div>
      <nav class="header-nav">
        <a href="#">Tienda</a>
        <a href="#">Biblioteca</a>
        <a href="#">Perfil</a>
      </nav>
      <div class="header-search">
        <img src="" alt="Buscar" />
      </div>
    </header>

    <main>
      <div class="content">

        <!-- Banner grande del juego -->
        <div class="detalle-banner">
          <img src="" alt="Banner del juego" />
        </div>

        <!-- Información del juego -->
        <div class="detalle-info">
          <div class="detalle-info-left">
            <p>Lorem</p>
          </div>
          <div class="detalle-info-right">
            <div class="detalle-info-bar"></div>
            <div class="detalle-info-bar"></div>
            <div class="detalle-info-bar"></div>
            <div class="detalle-info-bar"></div>
            <div class="detalle-info-bar"></div>
          </div>
        </div>

        <!-- Reseñas de usuarios -->
        <div class="detalle-reviews">
          <div class="detalle-review-avatar">
            <img src="" alt="Usuario 1" />
          </div>
          <div class="detalle-review-avatar">
            <img src="" alt="Usuario 2" />
          </div>
          <div class="detalle-review-avatar">
            <img src="" alt="Usuario 3" />
          </div>
          <div class="detalle-review-avatar">
            <img src="" alt="Usuario 4" />
          </div>
        </div>

      </div>
    </main>

    <div class="help-btn">?</div>

  </body>
</html>
